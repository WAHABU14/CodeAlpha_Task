<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>RMS Dashboard</title>
    <!-- Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-gH0dybQ0bq9kQmY1aK3nQmE1sZ6ZsFQ/2Yh6vZlY0sY1u1qv1QFz7u8Y8q1Y1Q5K" crossorigin="anonymous">
    <style>
        body { padding-top: 1.5rem; background: linear-gradient(180deg, #7babdb 0%, #adabc7 70%); }
        header { margin-bottom: 1.25rem; }
        .small-input { width: 100px; display:inline-block; }
        .header-bg {
            background: linear-gradient(90deg, #6479a0 0%, #6610f2 100%);
            color: rgb(17, 13, 13);
            padding: 1rem 1.25rem;
            border-radius: 0.5rem;
        }
        .card-accent { box-shadow: 0 6px 18px rgba(17,24,39,0.06); border-radius: 0.5rem; }
        .nav .nav-link { color: rgba(255,255,255,0.9); }
    </style>
</head>
<body>
<header class="container">
    <div class="d-flex justify-content-between align-items-center">
        <h1 class="h3 mb-0">RMS Dashboard</h1>
        <div>
            <a class="btn btn-outline-secondary btn-sm me-2" href="/admin/">Django Admin</a>
            {% if user.is_authenticated %}
                <span class="me-2">Signed in as <strong>{{ user.username }}</strong></span>
                <a class="btn btn-sm btn-outline-primary" href="/admin/logout/">Logout</a>
            {% else %}
                <a class="btn btn-sm btn-primary" href="/admin/login/">Login</a>
            {% endif %}
        </div>
    </div>
    <nav class="mt-3">
        <ul class="nav nav-pills">
            <li class="nav-item"><a class="nav-link" href="/dashboard/">Inventory</a></li>
            <li class="nav-item"><a class="nav-link" href="/dashboard/menu/">Menu</a></li>
            <li class="nav-item"><a class="nav-link" href="/dashboard/orders/">Orders</a></li>
        </ul>
    </nav>
</header>
<main class="container mt-4">
    {% block content %}{% endblock %}
</main>
</body>
</html>
