version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: events_user
      POSTGRES_PASSWORD: events_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  web:
    build: .
    command: sh -c "python manage.py migrate --noinput && gunicorn events_backend.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=postgres://events_user:events_pass@db:5432/events_db
      - DJANGO_SECRET_KEY=change-me
    depends_on:
      - db

volumes:
  postgres_data:
